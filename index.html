<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch vs Axios</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="general-container-page">
        <header class="basic-header">
            <h1>Consum de dades d'API amb Fetch i Axios</h1>
            <div class="container-controls">
                <select name="api-selector" id="api-selector">
                    <option value="fetch">Utilitza Fetch</option>
                    <option value="axios">Utilitza Axios</option>
                </select>
                <div class="search-elements">
                    <label><input type="text" name="search-input" id="search-input" placeholder="Cerca..."></label>
                    <button id="fetch-button" type="button">Obtenir Dades</button>
                </div>
            </div>
        </header>
        <main>
            <div class="hidden" id="loading-element"></div>
            <div class="hidden" id="insert-error-element">hola</div>
            <div id="insert-results"></div>
            <nav id="pagination-container" aria-label="paginació"></nav>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="main.js"></script>
</body>
</html>

<!-- CDN (Content Delivery Network) es una red de servidores distribuidos que sirve archivos estáticos. Cuando pones:
html<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
El navegador hace una petición a un servidor externo para descargar Axios en tiempo de carga de la página. La librería llega como un script global y deposita axios en window.
Con Vite en cambio harías:
npm install axios
Y en tu JS:
javascriptimport axios from 'axios';
Vite actúa como bundler — en el proceso de build lee todos tus imports, busca los paquetes en node_modules y los empaqueta junto con tu código en un único archivo optimizado. El navegador nunca hace peticiones externas para cargar librerías — todo ya está incluido en el bundle.
Resumiendo:

CDN → el navegador descarga la librería de un servidor externo en runtime
Vite + npm → la librería se empaqueta con tu código en build time, sin dependencias externas en producción -->
